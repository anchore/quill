# only pull in version updates that were released more than a week ago (low-pass filter for quickly-retracted releases)
cooldown: 7d
# note: we are inheriting tool definitions from anchore/go-make .binny.yaml, so we only need to specify tools here that
# are not already defined there (or that we want to override with different versions).
tools:
  # Build quill from source so the .tool/quill used to sign darwin binaries during release matches the
  # version being released, rather than a previously-published GitHub release tag (which is what go-make's
  # default .binny.yaml provides).
  - name: quill
    version:
      want: current
    method: go-install
    with:
      module: .
      entrypoint: cmd/quill
      ldflags:
        - -X main.version={{ .Version }}
        - -X main.gitCommit={{ .Version }}
        - -X main.gitDescription={{ .Version }}
        # note: sprig functions are available: http://masterminds.github.io/sprig/
        - -X main.buildDate={{ now | date "2006-01-02T15:04:05Z07:00" }}

  # Override go-make's default golangci-lint pin: quill's lint config relies on rules/behavior
  # introduced after v2.11.4 (the go-make embedded default) — notably, gosec G704 SSRF taint
  # analysis fires under v2.11.4 in code that lints clean under v2.12.2.
  - name: golangci-lint
    version:
      want: v2.12.2
    method: github-release
    with:
      repo: golangci/golangci-lint
